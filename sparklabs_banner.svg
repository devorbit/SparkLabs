<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#grad1)" />

  <!-- Spark icon (simplified) -->
  <g transform="translate(50,50)">
    <circle cx="20" cy="20" r="15" fill="#ffffff" />
    <path d="M10 20 L15 10 L20 20 L25 10 L30 20" stroke="#ff4500" stroke-width="3" fill="none" />
  </g>

  <!-- Title -->
  <text x="150" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">SparkLabs</text>

  <!-- Subtitle -->
  <text x="150" y="120" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">Learn Spark Easily</text>
  <text x="150" y="150" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">Sample Data Included</text>

  <!-- Data visualization elements (simplified bars) -->
  <rect x="500" y="100" width="20" height="60" fill="#ffffff" />
  <rect x="530" y="80" width="20" height="80" fill="#ffffff" />
  <rect x="560" y="120" width="20" height="40" fill="#ffffff" />
  <rect x="590" y="90" width="20" height="70" fill="#ffffff" />
  <rect x="620" y="110" width="20" height="50" fill="#ffffff" />

  <!-- Apache Spark text -->
  <text x="650" y="180" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Powered by Apache Spark</text>
</svg>
